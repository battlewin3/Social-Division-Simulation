<style>

  .sidebar {

    background: #fff; border-right: 1px solid #e1e4e8;
    padding: 20px; overflow-y: auto; z-index: 90;

  .stat-card {
    background: #f8f9fa; border-radius: 8px; padding: 12px; text-align: center;
  }
  .stat-card .value { font-size: 22px; font-weight: 700; color: #2c3e50; }
  .stat-card .label { font-size: 11px; color: #7f8c8d; margin-top: 4px; }
  .legend-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
  .legend-line { width: 24px; height: 2px; margin-right: 8px; }
  .node-detail {
    margin-top: 20px; padding: 12px; background: #f8f9fa; border-radius: 8px;
    font-size: 13px; line-height: 1.6; min-height: 80px;
  }
  .node-detail.empty { color: #95a5a6; font-style: italic; }
  #graph-container {
    position: fixed; top: 56px; left: 280px; right: 0; bottom: 0;
    background: #fff;
  }
  .tooltip {
    position: absolute; padding: 8px 12px; background: rgba(0,0,0,0.85);
    color: #fff; border-radius: 6px; font-size: 12px; pointer-events: none;
    opacity: 0; transition: opacity 0.15s; max-width: 280px; line-height: 1.5;
  }
  .controls {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    display: flex; flex-direction: column; gap: 8px;
  }
  .controls button {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    cursor: pointer; font-size: 18px; display: flex; align-items: center;
    justify-content: center; transition: all 0.2s;
  }
  .controls button:hover { background: #f0f0f0; transform: scale(1.1); }
  .filter-group { margin-bottom: 16px; }
  .filter-group label { display: flex; align-items: center; font-size: 13px; margin-bottom: 6px; cursor: pointer; }
  .filter-group input { margin-right: 6px; }
  .warning-banner {
    background: #fff3cd; border: 1px solid #ffc107; color: #856404;
    padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 16px;
  }
</style>
</head>

<script>
const networkData = {"nodes": [{"id": "scholar", "name": "陈华珊", "type": "scholar", "institution": "中国社会科学院", "detail": "调查对象: 陈华珊 (中国社会科学院)"}, {"id": "advisor_未知 — 未在公开资料中发现导师关系信息", "name": "未知 — 未在公开资料中发现导师关系信息", "type": "advisor", "institution": "", "detail": "导师: 未知 — 未在公开资料中发现导师关系信息"}, {"id": "collab_0_孙秀林", "name": "孙秀林", "type": "collaborator", "institution": "上海大学社会学院", "detail": "合作者: 孙秀林 | 机构: 上海大学社会学院"}, {"id": "collab_1_杨承澍", "name": "杨承澍", "type": "collaborator", "institution": "中国社会科学院大学", "detail": "合作者: 杨承澍 | 机构: 中国社会科学院大学"}, {"id": "collab_2_李汉林", "name": "李汉林", "type": "collaborator", "institution": "中国社会科学院", "detail": "合作者: 李汉林 | 机构: 中国社会科学院"}, {"id": "collab_3_渠敬东", "name": "渠敬东", "type": "collaborator", "institution": "北京大学/中国社会科学院", "detail": "合作者: 渠敬东 | 机构: 北京大学/中国社会科学院"}, {"id": "collab_4_夏传玲", "name": "夏传玲", "type": "collaborator", "institution": "中国社会科学院", "detail": "合作者: 夏传玲 | 机构: 中国社会科学院"}, {"id": "collab_5_宋时歌", "name": "宋时歌", "type": "collaborator", "institution": "未知", "detail": "合作者: 宋时歌 | 机构: 未知"}, {"id": "collab_6_叶锦涛", "name": "叶锦涛", "type": "collaborator", "institution": "上海大学社会学院", "detail": "合作者: 叶锦涛 | 机构: 上海大学社会学院"}, {"id": "collab_7_王呈伟", "name": "王呈伟", "type": "collaborator", "institution": "哥伦比亚大学", "detail": "合作者: 王呈伟 | 机构: 哥伦比亚大学"}, {"id": "collab_8_韦结余", "name": "韦结余", "type": "collaborator", "institution": "未知", "detail": "合作者: 韦结余 | 机构: 未知"}, {"id": "collab_9_蔡跃洲", "name": "蔡跃洲", "type": "collaborator", "institution": "未知", "detail": "合作者: 蔡跃洲 | 机构: 未知"}, {"id": "edit_0_长期担任《社会学研究》《社会》杂志匿名评审人", "name": "长期担任《社会学研究》《社会》杂志匿名评审人", "type": "editorial", "institution": "", "detail": "期刊: 长期担任《社会学研究》《社会》杂志匿名评审人 | 职务: 编委"}, {"id": "inst_0_高度依赖中国社会科学院体系（所有论文机构均为社科院或其下属单位）", "name": "高度依赖中国社会科学院体系（所有论文机构均为社科院或其下属单位）", "type": "institution", "institution": "", "detail": "机构: 高度依赖中国社会科学院体系（所有论文机构均为社科院或其下属单位） | 关系: 关联"}], "links": [{"source": "scholar", "target": "advisor_未知 — 未在公开资料中发现导师关系信息", "type": "advisor_of", "detail": "陈华珊 的导师是 未知 — 未在公开资料中发现导师关系信息", "weight": 1, "is_anomaly": false}, {"source": "scholar", "target": "collab_0_孙秀林", "type": "collaborates_with", "detail": "陈华珊 与 孙秀林 存在合作关系", "weight": 1, "is_anomaly": false}, {"source": "scholar", "target": "collab_1_杨承澍", "type": "collaborates_with", "detail": "陈华珊 与 杨承澍 存在合作关系", "weight": 1, "is_anomaly": false}, {"source": "scholar", "target": "collab_2_李汉林", "type": "collaborates_with", "detail": "陈华珊 与 李汉林 存在合作关系", "weight": 1, "is_anomaly": false}, {"source": "scholar", "target": "collab_3_渠敬东", "type": "collaborates_with", "detail": "陈华珊 与 渠敬东 存在合作关系", "weight": 1, "is_anomaly": false}, {"source": "scholar", "target": "collab_4_夏传玲", "type": "collaborates_with", "detail": "陈华珊 与 夏传玲 存在合作关系", "weight": 1, "is_anomaly": false}, {"source": "scholar", "target": "collab_5_宋时歌", "type": "collaborates_with", "detail": "陈华珊 与 宋时歌 存在合作关系", "weight": 1, "is_anomaly": false}, {"source": "scholar", "target": "collab_6_叶锦涛", "type": "collaborates_with", "detail": "陈华珊 与 叶锦涛 存在合作关系", "weight": 1, "is_anomaly": false}, {"source": "scholar", "target": "collab_7_王呈伟", "type": "collaborates_with", "detail": "陈华珊 与 王呈伟 存在合作关系", "weight": 1, "is_anomaly": false}, {"source": "scholar", "target": "collab_8_韦结余", "type": "collaborates_with", "detail": "陈华珊 与 韦结余 存在合作关系", "weight": 1, "is_anomaly": false}, {"source": "scholar", "target": "collab_9_蔡跃洲", "type": "collaborates_with", "detail": "陈华珊 与 蔡跃洲 存在合作关系", "weight": 1, "is_anomaly": false}, {"source": "scholar", "target": "edit_0_长期担任《社会学研究》《社会》杂志匿名评审人", "type": "editorial_board", "detail": "陈华珊 担任 长期担任《社会学研究》《社会》杂志匿名评审人 的 编委", "weight": 1, "is_anomaly": false}, {"source": "scholar", "target": "inst_0_高度依赖中国社会科学院体系（所有论文机构均为社科院或其下属单位）", "type": "affiliated_with", "detail": "陈华珊 与 高度依赖中国社会科学院体系（所有论文机构均为社科院或其下属单位） 存在 关联 关系", "weight": 1, "is_anomaly": false}]};

const width = document.getElementById('graph-container').clientWidth;
const height = document.getElementById('graph-container').clientHeight;

const svg = d3.select('#graph-container').append('svg')
  .attr('width', width)
  .attr('height', height)
  .attr('viewBox', [0, 0, width, height]);

// Zoom
const g = svg.append('g');
const zoom = d3.zoom()
  .scaleExtent([0.3, 4])
  .on('zoom', (e) => g.attr('transform', e.transform));
svg.call(zoom);

function resetZoom() {
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
}

let animationEnabled = true;
function toggleAnimation() {
  animationEnabled = !animationEnabled;
  if (animationEnabled) simulation.alpha(0.3).restart();
  else simulation.stop();
}

// Color & radius maps
const nodeTypes = {"scholar": {"label": "调查对象", "color": "#e74c3c", "radius": 24}, "advisor": {"label": "导师", "color": "#2980b9", "radius": 18}, "collaborator": {"label": "合作者", "color": "#27ae60", "radius": 16}, "editorial": {"label": "编委/期刊", "color": "#8e44ad", "radius": 16}, "citer": {"label": "引用者", "color": "#1abc9c", "radius": 12}, "core_subject": {"label": "核心调查对象", "color": "#c0392b", "radius": 26}, "protector": {"label": "庇护者/保护伞", "color": "#2980b9", "radius": 20}, "accomplice": {"label": "共犯/执行者", "color": "#e67e22", "radius": 16}, "external": {"label": "外部合作者", "color": "#27ae60", "radius": 16}, "academic": {"label": "学术关联者", "color": "#8e44ad", "radius": 15}, "family": {"label": "亲属关系", "color": "#e84393", "radius": 14}, "victim": {"label": "受害者", "color": "#6c5ce7", "radius": 16}, "official": {"label": "官方/调查组", "color": "#636e72", "radius": 18}, "institution": {"label": "机构", "color": "#95a5a6", "radius": 18}, "unknown": {"label": "未知", "color": "#95a5a6", "radius": 10}};
const linkTypes = {"advisor_of": {"label": "导师", "color": "#2980b9", "width": 3}, "collaborates_with": {"label": "合作", "color": "#27ae60", "width": 2}, "editorial_board": {"label": "编委", "color": "#8e44ad", "width": 2}, "cites": {"label": "引用", "color": "#1abc9c", "width": 1}, "mutual_cite": {"label": "互引", "color": "#e67e22", "width": 2, "dash": true}, "shelter": {"label": "结构性庇护", "color": "#c0392b", "width": 3}, "academic_packaging": {"label": "学术包装", "color": "#8e44ad", "width": 2}, "money_laundering": {"label": "资金中转", "color": "#e67e22", "width": 3}, "project_collab": {"label": "项目合作", "color": "#27ae60", "width": 2}, "clinical": {"label": "临床协作", "color": "#636e72", "width": 1.5}, "accomplice_link": {"label": "同案犯", "color": "#e67e22", "width": 2}, "victimization": {"label": "受害者关系", "color": "#6c5ce7", "width": 3}, "family": {"label": "亲属关系", "color": "#e84393", "width": 1.5}, "formal_punishment": {"label": "象征性问责", "color": "#636e72", "width": 2, "dash": true}, "affiliated_with": {"label": "机构关联", "color": "#95a5a6", "width": 1}};

// Filters
const activeTypes = new Set(Object.keys(nodeTypes));

function updateFilters() {
  document.querySelectorAll('.filter-group input').forEach(cb => {
    if (cb.checked) activeTypes.add(cb.value);
    else activeTypes.delete(cb.value);
  });

  const activeNodeIds = new Set(networkData.nodes
    .filter(n => activeTypes.has(n.type))
    .map(n => n.id));

  nodeElements.style('opacity', d => activeNodeIds.has(d.id) ? 1 : 0.05)
    .style('pointer-events', d => activeNodeIds.has(d.id) ? 'all' : 'none');
  linkElements.style('opacity', d =>
    activeNodeIds.has(d.source.id) && activeNodeIds.has(d.target.id) ? 0.6 : 0.02);
  labelElements.style('opacity', d => activeNodeIds.has(d.id) ? 1 : 0.05);
}

// Simulation
const simulation = d3.forceSimulation(networkData.nodes)
  .force('link', d3.forceLink(networkData.links).id(d => d.id).distance(d => {
    return d.type === 'advisor_of' ? 120 : d.type === 'collaborates_with' ? 100 : 140;
  }))
  .force('charge', d3.forceManyBody().strength(d => d.type === 'scholar' ? -800 : -400))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collide', d3.forceCollide().radius(d => (nodeTypes[d.type]?.radius || 10) + 8));

// Links
const linkElements = g.append('g')
  .selectAll('line')
  .data(networkData.links)
  .join('line')
  .attr('stroke', d => linkTypes[d.type]?.color || '#999')
  .attr('stroke-width', d => linkTypes[d.type]?.width || 1)
  .attr('stroke-opacity', 0.6)
  .attr('stroke-dasharray', d => linkTypes[d.type]?.dash ? '5,5' : 'none');

// Nodes
const nodeElements = g.append('g')
  .selectAll('circle')
  .data(networkData.nodes)
  .join('circle')
  .attr('r', d => nodeTypes[d.type]?.radius || 10)
  .attr('fill', d => nodeTypes[d.type]?.color || '#95a5a6')
  .attr('stroke', '#fff')
  .attr('stroke-width', 2)
  .style('cursor', 'pointer')
  .call(d3.drag()
    .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

// Labels
const labelElements = g.append('g')
  .selectAll('text')
  .data(networkData.nodes)
  .join('text')
  .text(d => d.name)
  .attr('font-size', d => d.type === 'scholar' ? 14 : 11)
  .attr('font-weight', d => d.type === 'scholar' ? 700 : 400)
  .attr('fill', '#2c3e50')
  .attr('dx', d => (nodeTypes[d.type]?.radius || 10) + 4)
  .attr('dy', 4)
  .style('pointer-events', 'none')
  .style('text-shadow', '0 0 3px rgba(255,255,255,0.8)');

// Tooltip & detail
const tooltip = d3.select('#tooltip');
const detailBox = document.getElementById('node-detail');

nodeElements
  .on('mouseover', (e, d) => {
    tooltip.style('opacity', 1)
      .html(`<strong>${d.name}</strong><br/>类型: ${nodeTypes[d.type]?.label || d.type}<br/>${d.institution ? '机构: ' + d.institution + '<br/>' : ''}${d.detail || ''}`)
      .style('left', (e.pageX + 12) + 'px')
      .style('top', (e.pageY - 10) + 'px');
  })
  .on('mouseout', () => tooltip.style('opacity', 0))
  .on('click', (e, d) => {
    detailBox.classList.remove('empty');
    detailBox.innerHTML = `<strong style="font-size:15px;color:${nodeTypes[d.type]?.color || '#333'}">${d.name}</strong><br/><span style="color:#7f8c8d;font-size:12px">${nodeTypes[d.type]?.label || d.type}</span><br/><br/>${d.detail || '暂无详细信息'}`;
    e.stopPropagation();
  });

svg.on('click', () => {
  detailBox.classList.add('empty');
  detailBox.textContent = '点击节点查看详细信息';
});

simulation.on('tick', () => {
  linkElements
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);
  nodeElements
    .attr('cx', d => d.x)
    .attr('cy', d => d.y);
  labelElements
    .attr('x', d => d.x)
    .attr('y', d => d.y);
});

// Initial filter setup
document.querySelectorAll('.filter-group input').forEach(cb => {
  cb.addEventListener('change', updateFilters);
});
</script>

</body>
</html>
